# ML Drift Monitor — Configuration
# All tunable parameters in one place

model:
  algorithm: xgboost
  n_estimators: 300
  max_depth: 6
  learning_rate: 0.05
  scale_pos_weight: 577  # ~(284315/492) for imbalanced fraud dataset
  random_state: 42
  test_size: 0.2

smote:
  enabled: true
  random_state: 42
  k_neighbors: 5

data:
  raw_path: data/raw/creditcard.csv
  reference_output: data/reference_data.parquet
  simulated_dir: data/simulated
  model_output: model/model.pkl
  feature_importance_output: model/feature_importance.json

drift_simulation:
  n_weeks: 12
  batch_size: 3000
  min_fraud_per_batch: 15      # garantia mínima de casos de fraude por batch
  random_seed: 42
  drift_features:
    - V4
    - V11
    - Amount
  drift_schedule:
    # subtle drift: weeks 1-3 — abaixo do threshold (PSI ~0.05-0.10)
    subtle_weeks: [1, 2, 3]
    subtle_intensity: 0.06
    # detectable drift: weeks 4-7 — cruzando o threshold (PSI ~0.12-0.22)
    detectable_weeks: [4, 5, 6, 7]
    detectable_intensity: 0.28
    # critical drift: weeks 8-12 — bem acima do threshold (PSI > 0.25)
    critical_weeks: [8, 9, 10, 11, 12]
    critical_intensity: 0.85
  concept_drift_start_week: 8  # fraud patterns change here

monitoring:
  reports_dir: reports
  metrics_dir: metrics
  alert_thresholds:
    psi: 0.2          # PSI > 0.2 = significant drift
    f1_drop: 0.10     # 10% relative drop triggers alert
    share_drifted: 0.3  # 30% of features drifted

api:
  host: 0.0.0.0
  port: 8000
  reload: false

dashboard:
  port: 8501
  default_threshold_psi: 0.2
  default_threshold_f1_drop: 0.10
